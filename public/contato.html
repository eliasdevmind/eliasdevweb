<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Elias Araújo</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="container contato-container">
    <h1>Entre em Contato</h1>

    <form id="contatoForm">
      <input type="text" name="nome" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="Seu email" required>
      <textarea name="mensagem" placeholder="Escreva sua mensagem..." required></textarea>
      <button type="submit">Enviar Mensagem</button>
    </form>

    <p id="resposta"></p>

    <a href="/" class="voltar-btn">← Voltar para o Início</a>
  </div>

  <script>
    const form = document.getElementById("contatoForm");
    const resposta = document.getElementById("resposta");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const dados = {
        nome: form.nome.value,
        email: form.email.value,
        mensagem: form.mensagem.value
      };

      const res = await fetch("/enviar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
      });

      const resultado = await res.json();
      resposta.textContent = resultado.message;

      if (resultado.success) {
        resposta.style.color = "lightgreen";
        form.reset();
      } else {
        resposta.style.color = "red";
      }
    });
  </script>
</body>
</html>
